<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="/socket.io/socket.io.js"></script>

<div class="main">

<input id="cardName" placeholder="Nombre tarjeta">
<button onclick="loadCard()">Cargar</button>

<canvas id="canvas" width="600" height="350"></canvas>

<input type="file" id="upload">

<button onclick="addMessage()">Mensaje</button>

</div>

<script>
const canvas = new fabric.Canvas('canvas');
const socket = io();

let currentCard = null;
let isUpdating = false;

// cargar tarjeta
async function loadCard(){
  const name = cardName.value.trim();
  if (!name) {
    alert("Escribe un nombre de tarjeta");
    return;
  }

  const res = await fetch("/card/" + encodeURIComponent(name));
  if (!res.ok) {
    alert("No se pudo cargar la tarjeta");
    return;
  }

  const data = await res.json();

  isUpdating = true;
  canvas.loadFromJSON(data.template, () => {
    canvas.renderAll();
    isUpdating = false;
  });

  currentCard = name;
  socket.emit("join-card", name);
}

// agregar mensaje
function addMessage(){
  const t = new fabric.IText("Mensaje", { left:100, top:100 });
  canvas.add(t);
}

// enviar cambios
canvas.on("object:modified", send);
canvas.on("object:added", send);
canvas.on("object:removed", send);

async function persistCard(data) {
  if (!currentCard) return;

  await fetch("/join", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: currentCard, template: data })
  });
}

function send(){
  if (isUpdating || !currentCard) return;

  const data = JSON.stringify(canvas.toJSON());
  socket.emit("canvas-update", { cardName: currentCard, data });
  persistCard(data);
}

// recibir cambios
socket.on("canvas-update", (data)=>{
  isUpdating = true;
  canvas.loadFromJSON(data, ()=>{
    canvas.renderAll();
    isUpdating = false;
  });
  persistCard(data);
});

// upload imagen
upload.onchange = function(e){
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(f){
    fabric.Image.fromURL(f.target.result, img=>{
      img.scaleToWidth(200);
      canvas.add(img);
    });
  };

  reader.readAsDataURL(file);
};
</script>
